name: release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    # Token-based fallback (NPM_TOKEN). Sparkline reverted from OIDC in 1.0.1;
    # migrate back to OIDC once npmjs.com Trusted Publisher provisioning is
    # cleared. To switch: remove `use-oidc: false` + `provenance: false` and
    # `secrets:` block, and add `permissions: id-token: write` above.
    uses: coroboros/ci/.github/workflows/npm-publish.yml@v1
    with:
      use-oidc: false
      provenance: false
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
